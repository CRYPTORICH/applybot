<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lead CRM</title>
<style>
:root{--bg:#0a0a0a;--card:#141414;--accent:#00e676;--hot:#ffab00;--dead:#ff1744;--sold:#2979ff;--text:#eee;--sub:#999;--border:#222;--surface:#1c1c1c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 12px 8px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:18px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.search{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:14px;width:100%;outline:none;margin-bottom:6px}
.search:focus{border-color:var(--accent)}
.filters{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filters button{background:var(--card);color:var(--sub);border:1px solid var(--border);padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.filters button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.lead-list{padding:6px 10px 90px}
.lead-card{background:var(--card);border-radius:10px;margin-bottom:6px;overflow:hidden;border-left:3px solid transparent}
.lead-card.status-called{border-left-color:var(--hot)}
.lead-card.status-hot{border-left-color:var(--accent)}
.lead-card.status-sold{border-left-color:var(--sold)}
.lead-card.status-dead{border-left-color:var(--dead)}
.lead-row{display:flex;align-items:center;padding:12px 10px;gap:10px;cursor:pointer;min-height:56px}
.lead-row:active{background:var(--surface)}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-sub{font-size:11px;color:var(--sub);margin-top:1px;display:flex;gap:6px;align-items:center}
.badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700}
.badge-no-site{background:rgba(255,23,68,.15);color:var(--dead)}
.badge-fake{background:rgba(255,171,0,.15);color:var(--hot)}
.call-btn{background:var(--accent);color:#000;border:none;min-width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Call overlay */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
.overlay.active{display:flex}
.overlay-header{display:flex;align-items:center;padding:12px;gap:10px;border-bottom:1px solid var(--border)}
.overlay-header .lead-name{font-size:16px}
.overlay-header .lead-sub{font-size:12px}
.hangup-btn{background:var(--dead);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-weight:700;font-size:14px;margin-left:auto;cursor:pointer}
.script-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.script-block{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--border)}
.script-block .label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.script-block .content{font-size:14px;line-height:1.6;color:#ddd}
.script-block .content em{color:var(--accent);font-style:normal;font-weight:600}
.copy-site-btn{background:var(--accent);color:#000;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;text-align:center;margin-top:auto}
.copy-site-btn:active{filter:brightness(0.8)}

/* Result modal */
.result-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.result-modal.active{display:flex}
.result-panel{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:20px 16px 30px;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.result-panel h2{font-size:18px;margin-bottom:4px}
.result-panel .sub{font-size:13px;color:var(--sub);margin-bottom:16px}
.result-options{display:flex;flex-direction:column;gap:8px}
.result-btn{display:flex;align-items:center;gap:10px;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;text-align:left;background:var(--surface);color:var(--text)}
.result-btn:active{filter:brightness(1.3)}
.result-btn .emoji{font-size:22px}
.result-btn.sale{background:rgba(41,121,255,.15);color:var(--sold)}
.result-btn.hot{background:rgba(0,230,118,.15);color:var(--accent)}
.result-btn.voicemail{background:rgba(255,171,0,.15);color:var(--hot)}
.result-btn.no{background:rgba(255,23,68,.15);color:var(--dead)}
.result-btn.callback{background:rgba(255,255,255,.05);color:var(--sub)}
.quick-notes{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.note-chip{background:var(--surface);border:1px solid var(--border);color:var(--sub);padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;white-space:nowrap}
.note-chip:active,.note-chip.selected{background:var(--accent);color:#000;border-color:var(--accent)}
.note-custom{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;width:100%;margin-top:8px;outline:none;resize:none}
.note-custom:focus{border-color:var(--accent)}
.done-btn{background:var(--accent);color:#000;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.done-btn:active{filter:brightness(0.8)}

.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:4px 6px;padding-bottom:max(4px,env(safe-area-inset-bottom));z-index:10}
.nav-item{flex:1;text-align:center;padding:6px 2px;border:none;background:none;color:var(--sub);font-size:10px;cursor:pointer;border-radius:6px}
.nav-item.active{color:var(--accent);font-weight:700}
.nav-count{display:block;font-size:16px;font-weight:700;margin-bottom:1px}
.nav-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:2px;vertical-align:middle}
.nav-dot.called{background:var(--hot)}
.nav-dot.hot{background:var(--accent)}
.nav-dot.sold{background:var(--sold)}
.nav-dot.dead{background:var(--dead)}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:8px 20px;border-radius:20px;font-weight:700;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 Leads <span style="font-size:12px;color:var(--sub);font-weight:400" id="summary"></span></h1>
  <input class="search" placeholder="Search name or number..." oninput="renderLeads()" id="search">
  <div class="filters">
    <button class="active" onclick="setFilter('all',this)">All</button>
    <button onclick="setFilter('no-site',this)">🔴 No Site</button>
    <button onclick="setFilter('fake',this)">🟡 Fake</button>
    <button onclick="setFilter('HVAC',this)">HVAC</button>
    <button onclick="setFilter('Electrician',this)">Electrician</button>
    <button onclick="setFilter('Plumber',this)">Plumber</button>
    <button onclick="setFilter('Roofer',this)">Roofer</button>
  </div>
</div>

<div class="lead-list" id="leadList"></div>

<div class="navbar">
  <button class="nav-item active" onclick="setNav('all',this)"><span class="nav-count" id="navAll">0</span>All</button>
  <button class="nav-item" onclick="setNav('called',this)"><span class="nav-count" id="navCalled">0</span>Called</button>
  <button class="nav-item" onclick="setNav('hot',this)"><span class="nav-count" id="navHot">0</span>Hot</button>
  <button class="nav-item" onclick="setNav('sold',this)"><span class="nav-count" id="navSold">0</span>Sold</button>
  <button class="nav-item" onclick="setNav('dead',this)"><span class="nav-count" id="navDead">0</span>Dead</button>
</div>

<!-- Call overlay -->
<div class="overlay" id="callOverlay">
  <div class="overlay-header">
    <div>
      <div class="lead-name" id="overlayName"></div>
      <div class="lead-sub" id="overlaySub"></div>
    </div>
    <button class="hangup-btn" onclick="endCall()">✕ End Call</button>
  </div>
  <div class="script-area" id="scriptArea"></div>
  <button class="copy-site-btn" id="copySiteOverlay" onclick="copySiteOverlay()">📋 Copy Site Link</button>
</div>

<!-- Result modal -->
<div class="result-modal" id="resultModal">
  <div class="result-panel">
    <h2 id="resultTitle">Call Complete</h2>
    <div class="sub" id="resultSub"></div>
    <div class="result-options">
      <button class="result-btn sale" onclick="saveResult('sold')">💰 <span>Sold — got the $$$</span></button>
      <button class="result-btn hot" onclick="saveResult('hot')">🔥 <span>Hot lead — interested</span></button>
      <button class="result-btn voicemail" onclick="saveResult('called')">📱 <span>Left voicemail</span></button>
      <button class="result-btn callback" onclick="saveResult('called')">🔄 <span>Call back later</span></button>
      <button class="result-btn no" onclick="saveResult('dead')">☠️ <span>No interest / dead</span></button>
    </div>
    <div class="quick-notes" id="quickNotes">
      <span class="note-chip" onclick="toggleNote(this,'Sent site link')">Sent site link</span>
      <span class="note-chip" onclick="toggleNote(this,'Will think about it')">Will think about it</span>
      <span class="note-chip" onclick="toggleNote(this,'Asked for quote')">Asked for quote</span>
      <span class="note-chip" onclick="toggleNote(this,'Wrong number')">Wrong number</span>
      <span class="note-chip" onclick="toggleNote(this,'Call back Tue')">Call back Tue</span>
      <span class="note-chip" onclick="toggleNote(this,'Call back Wed')">Call back Wed</span>
      <span class="note-chip" onclick="toggleNote(this,'Already has site')">Already has site</span>
      <span class="note-chip" onclick="toggleNote(this,'No answer')">No answer</span>
    </div>
    <textarea class="note-custom" placeholder="Or type a note..." id="customNote" rows="2"></textarea>
    <button class="done-btn" onclick="saveResult(null)">✓ Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let leads = [];
let statuses = JSON.parse(localStorage.getItem('leadStatuses')||'{}');
let notes = JSON.parse(localStorage.getItem('leadNotes')||'{}');
let currentNav = 'all';
let currentFilter = 'all';
let activeCall = null;
let selectedNotes = [];

async function init() {
  try {
    const resp = await fetch('leads.json');
    leads = await resp.json();
  } catch(e) {
    try {
      const resp = await fetch('../leads.json');
      leads = await resp.json();
    } catch(e2) {
      console.log('No leads loaded');
    }
  }
  normalizeLeads();
  setupVisibility();
  renderAll();
}

function normalizeLeads() {
  leads.forEach(l => {
    l.name = (l.name||'').trim();
    l.phone = (l.phone||'').replace(/\D/g,'');
    l.category = l.category||'Unknown';
    l.zip = l.zip||'';
    l.type = l.type||'FAKE';
    l.website = l.website||'';
    l.opener = l.opener||'';
    l.slug = l.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  });
}

function getStatus(name) { return statuses[name]||'new'; }
function getNote(name) { return notes[name]||''; }

function setStatus(name, st, noteText) {
  statuses[name] = st;
  if (noteText) notes[name] = noteText;
  localStorage.setItem('leadStatuses', JSON.stringify(statuses));
  localStorage.setItem('leadNotes', JSON.stringify(notes));
}

function getSiteUrl(name) {
  const l = leads.find(x => x.name === name);
  if (!l) return '';
  return `https://cryptorich.github.io/applybot/sites/${l.slug}/`;
}

function setNav(nav, btn) {
  currentNav = nav;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function renderAll() { updateCounts(); renderLeads(); }

function updateCounts() {
  let c={all:0,called:0,hot:0,sold:0,dead:0};
  leads.forEach(l=>{
    c.all++;
    const st = getStatus(l.name);
    if(st==='called') c.called++;
    if(st==='hot') c.hot++;
    if(st==='sold') c.sold++;
    if(st==='dead') c.dead++;
  });
  document.getElementById('navAll').textContent = c.all;
  document.getElementById('navCalled').textContent = c.called;
  document.getElementById('navHot').textContent = c.hot;
  document.getElementById('navSold').textContent = c.sold;
  document.getElementById('navDead').textContent = c.dead;
  document.getElementById('summary').textContent = `${c.all} total · ${c.called} called · ${c.hot} hot · ${c.sold} sold`;
}

function renderLeads() {
  const search = (document.getElementById('search').value||'').toLowerCase();
  let filtered = leads;
  if (search) filtered = filtered.filter(l => l.name.toLowerCase().includes(search) || l.phone.includes(search));
  if (currentNav === 'called') filtered = filtered.filter(l => getStatus(l.name)==='called');
  if (currentNav === 'hot') filtered = filtered.filter(l => getStatus(l.name)==='hot');
  if (currentNav === 'sold') filtered = filtered.filter(l => getStatus(l.name)==='sold');
  if (currentNav === 'dead') filtered = filtered.filter(l => getStatus(l.name)==='dead');
  if (currentFilter === 'no-site') filtered = filtered.filter(l => l.type==='NO_SITE');
  else if (currentFilter === 'fake') filtered = filtered.filter(l => l.type==='FAKE');
  else if (['HVAC','Electrician','Plumber','Roofer'].includes(currentFilter)) filtered = filtered.filter(l => l.category===currentFilter);

  const list = document.getElementById('leadList');
  if (!filtered.length) { list.innerHTML = '<div class="empty">No leads match</div>'; return; }

  list.innerHTML = filtered.map(l => {
    const st = getStatus(l.name);
    const nt = getNote(l.name);
    const phoneFormatted = l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3');
    const typeBadge = l.type==='NO_SITE' ? '<span class="badge badge-no-site">NO SITE</span>' : l.type==='FAKE' ? '<span class="badge badge-fake">FAKE</span>' : '';
    const notePreview = nt ? ` · 💬 ${nt}` : '';

    return `<div class="lead-card status-${st}" id="card-${l.slug}">
      <div class="lead-row" onclick="startCall('${l.name.replace(/'/g,"\\'")}')">
        <div class="lead-info">
          <div class="lead-name">${l.name}</div>
          <div class="lead-sub">${l.category||'?'} · ${phoneFormatted}${notePreview} ${typeBadge}</div>
        </div>
        <a href="tel:+1${l.phone}" class="call-btn" onclick="event.stopPropagation();startCall('${l.name.replace(/'/g,"\\'")}')">📞</a>
      </div>
    </div>`;
  }).join('');
}

// CALL FLOW
function startCall(name) {
  const l = leads.find(x => x.name === name);
  if (!l) return;
  
  activeCall = name;
  selectedNotes = [];
  
  // Show overlay
  document.getElementById('overlayName').textContent = l.name;
  document.getElementById('overlaySub').textContent = `${l.category} · ${l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3')}`;
  
  // Build script
  const siteUrl = getSiteUrl(name);
  const hasSite = l.type === 'NO_SITE';
  const hasFake = l.type === 'FAKE';
  
  let scriptHTML = '';
  
  // Opener
  scriptHTML += `<div class="script-block">
    <div class="label">🗣️ OPENER</div>
    <div class="content">${l.opener || `Hey, is this <em>${l.name.split(' ')[0]}</em>? I'm Rick — I was looking for a <em>${l.category.toLowerCase()}</em> in the area and couldn't find a real website for your business. I actually went ahead and <em>built one</em>. Want me to text you the link?`}</div>
  </div>`;
  
  // Site link
  scriptHTML += `<div class="script-block">
    <div class="label">🔗 SITE TO TEXT</div>
    <div class="content" style="word-break:break-all;font-family:monospace;font-size:12px;color:var(--accent)">${siteUrl}</div>
  </div>`;
  
  // If they hesitate
  scriptHTML += `<div class="script-block">
    <div class="label">😐 IF THEY HESITATE</div>
    <div class="content">No pressure — keep looking at it. <em>80% of people searching for ${l.category.toLowerCase()}s click the first 3 Google results.</em> Without a real site, you don't exist to those people. I'm not selling a website — I'm selling you the <em>customers you're already losing</em>.</div>
  </div>`;
  
  // Close
  scriptHTML += `<div class="script-block">
    <div class="label">💰 CLOSE</div>
    <div class="content">So here's the deal — <em>$500 and it's yours.</em> I'll connect your domain, set up email, hand you the keys. You pay <em>after</em> it's live under your name. Want to do this?</div>
  </div>`;
  
  // If they say no
  scriptHTML += `<div class="script-block">
    <div class="label">👋 IF THEY SAY NO</div>
    <div class="content">No worries at all. Thanks for taking a look. If you ever want it, just <em>text me at this number</em> — site's already built, takes 5 minutes to set up.</div>
  </div>`;
  
  document.getElementById('scriptArea').innerHTML = scriptHTML;
  document.getElementById('copySiteOverlay').onclick = () => {
    navigator.clipboard.writeText(siteUrl).then(() => showToast('Site link copied! 📋'));
  };
  document.getElementById('copySiteOverlay').textContent = '📋 Copy Site Link';
  
  document.getElementById('callOverlay').classList.add('active');
  
  // Open phone dialer
  window.location.href = `tel:+1${l.phone}`;
}

function copySiteOverlay() {
  const url = getSiteUrl(activeCall);
  navigator.clipboard.writeText(url).then(() => showToast('Site link copied! 📋'));
}

function endCall() {
  document.getElementById('callOverlay').classList.remove('active');
  
  if (!activeCall) return;
  
  const l = leads.find(x => x.name === activeCall);
  if (!l) return;
  
  // Mark as called immediately
  const currentStatus = getStatus(activeCall);
  if (currentStatus === 'new') setStatus(activeCall, 'called', '');
  
  // Show result modal
  document.getElementById('resultTitle').textContent = `How'd it go with ${l.name.split(' ')[0]}?`;
  document.getElementById('resultSub').textContent = `${l.category} · ${l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3')}`;
  
  selectedNotes = [];
  document.querySelectorAll('.note-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('customNote').value = '';
  
  document.getElementById('resultModal').classList.add('active');
}

function toggleNote(chip, text) {
  chip.classList.toggle('selected');
  if (chip.classList.contains('selected')) {
    selectedNotes.push(text);
  } else {
    selectedNotes = selectedNotes.filter(n => n !== text);
  }
}

function saveResult(statusOverride) {
  if (!activeCall) return;
  
  const status = statusOverride || 'called';
  const custom = document.getElementById('customNote').value.trim();
  const allNotes = [...selectedNotes, custom].filter(Boolean).join('; ');
  
  setStatus(activeCall, status, allNotes);
  
  document.getElementById('resultModal').classList.remove('active');
  activeCall = null;
  selectedNotes = [];
  
  const labels = {sold:'💰 Sold!',hot:'🔥 Hot lead!',called:'📱 Called',dead:'☠️ Marked dead'};
  showToast(labels[status]||'✓ Saved');
  renderAll();
}

function setupVisibility() {
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && activeCall) {
      // User switched away (probably to phone app) — wait for return
    }
    if (!document.hidden && activeCall) {
      // User came back — show the result modal
      setTimeout(endCall, 500);
    }
  });
  
  // Also detect if user taps "End Call" button on overlay
  document.getElementById('callOverlay').addEventListener('click', function(e) {
    if (e.target === this) endCall();
  });
  
  document.getElementById('resultModal').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
      activeCall = null;
      selectedNotes = [];
      renderAll();
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
