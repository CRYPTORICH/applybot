<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Call CRM</title>
<style>
:root{--bg:#080808;--card:#111;--surface:#1a1a1a;--border:#222;--accent:#00e676;--hot:#ffab00;--sold:#2979ff;--dead:#ff1744;--text:#fff;--sub:#888;--danger-zone:#660000}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent;user-select:none;overflow-x:hidden}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:6px 10px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:15px;display:inline}
.topbar .summary{font-size:10px;color:var(--sub);float:right;margin-top:3px}
.search-row{display:flex;gap:6px;margin-top:5px}
.search-row input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px;outline:none}
.search-row input:focus{border-color:var(--accent)}
.cat-row{display:flex;gap:4px;margin-top:5px;overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-row button{flex-shrink:0;background:var(--surface);color:var(--sub);border:1px solid var(--border);padding:4px 10px;border-radius:10px;font-size:10px;cursor:pointer;white-space:nowrap}
.cat-row button.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* ── LEAD LIST ── */
.lead-list{padding:4px 8px 70px}
.lead-row{display:flex;align-items:center;background:var(--card);border-radius:8px;margin-bottom:4px;padding:10px 8px;gap:8px;cursor:pointer;border-left:3px solid transparent;min-height:52px}
.lead-row:active{background:var(--surface)}
.lead-row.status-called{border-left-color:var(--hot)}
.lead-row.status-hot{border-left-color:var(--accent)}
.lead-row.status-sold{border-left-color:var(--sold)}
.lead-row.status-dead{border-left-color:var(--dead)}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-meta{font-size:10px;color:var(--sub);margin-top:2px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.lead-note{font-size:10px;color:var(--hot);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-cb{font-size:9px;color:var(--accent);background:rgba(0,230,118,.1);padding:1px 5px;border-radius:4px;display:inline-block}
.badge{font-size:8px;padding:1px 5px;border-radius:5px;font-weight:700}
.badge-nosite{background:rgba(255,23,68,.2);color:var(--dead)}
.badge-fake{background:rgba(255,171,0,.2);color:var(--hot)}
.badge-hot{background:rgba(0,230,118,.2);color:var(--accent)}
.badge-sold{background:rgba(41,121,255,.2);color:var(--sold)}
.badge-dead{background:rgba(255,23,68,.2);color:var(--dead)}
.call-icon{background:var(--accent);color:#000;min-width:40px;height:40px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── RESULT MODAL (the main interaction) ── */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-back.on{display:flex}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:500px;padding:16px 12px 24px;max-height:85dvh;overflow-y:auto;animation:slideUp .2s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:15px;margin-bottom:2px}
.modal .msub{font-size:11px;color:var(--sub);margin-bottom:10px}

/* Big status buttons — 2x2 grid */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.stat-btn{padding:14px 8px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;text-align:center;color:var(--text);background:var(--surface)}
.stat-btn:active{filter:brightness(1.3)}
.stat-btn.voicemail{background:rgba(255,171,0,.15);color:var(--hot)}
.stat-btn.interested{background:rgba(0,230,118,.15);color:var(--accent)}
.stat-btn.notinterested{background:rgba(255,23,68,.1);color:var(--dead)}
.stat-btn.sold{background:rgba(41,121,255,.2);color:var(--sold)}

/* Note input */
.note-section{margin-bottom:8px}
.note-section textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:14px;resize:none;min-height:60px;outline:none;font-family:inherit}
.note-section textarea:focus{border-color:var(--accent)}

/* Quick chips that INSERT into textarea */
.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.chip{background:var(--surface);border:1px solid var(--border);color:var(--sub);padding:5px 10px;border-radius:12px;font-size:10px;cursor:pointer}
.chip:active{background:var(--accent);color:#000;border-color:var(--accent)}

/* Callback row */
.cb-section{margin:8px 0}
.cb-section .label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.cb-row{display:flex;gap:4px;flex-wrap:wrap}
.cb-btn{background:rgba(0,230,118,.1);color:var(--accent);border:1px solid rgba(0,230,118,.2);padding:6px 10px;border-radius:8px;font-size:10px;cursor:pointer;white-space:nowrap}
.cb-btn:active{background:var(--accent);color:#000}
.cb-clear{background:rgba(255,23,68,.1);color:var(--dead);border:1px solid rgba(255,23,68,.2)}

/* Action row */
.action-row{display:flex;gap:8px;margin-top:10px}
.action-row button{flex:1;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.btn-save{background:var(--accent);color:#000}
.btn-dismiss{background:none;color:var(--sub);font-weight:400;font-size:12px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:8px 16px;border-radius:20px;font-weight:700;font-size:12px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* Delivery checklist */
.check-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--surface);border-radius:8px;font-size:13px;margin-bottom:4px;cursor:pointer}
.check-item input{width:18px;height:18px;accent-color:var(--accent)}

/* Empty state */
.empty{text-align:center;padding:50px 16px;color:var(--sub);font-size:13px}
.empty strong{color:var(--text)}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <h1>📞 Call CRM</h1>
  <span class="summary" id="summary"></span>
  <div class="search-row">
    <input type="text" placeholder="Search name or phone..." id="search" oninput="renderLeads()">
    <button style="background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap" onclick="nextCall()">▶ Next</button>
  </div>
  <div class="cat-row" id="catRow">
    <button class="on" onclick="setFilter('all',this)">All</button>
    <button onclick="setFilter('no-site',this)">No Site</button>
    <button onclick="setFilter('HVAC',this)">HVAC</button>
    <button onclick="setFilter('Electrician',this)">Electrician</button>
    <button onclick="setFilter('Plumber',this)">Plumber</button>
    <button onclick="setFilter('Roofer',this)">Roofer</button>
    <button onclick="setFilter('callback',this)">📅 Callback</button>
  </div>
</div>

<!-- ── LEAD LIST ── -->
<div class="lead-list" id="leadList"></div>

<!-- ── RESULT MODAL ── -->
<div class="modal-back" id="resultModal">
  <div class="modal">
    <h2 id="modalTitle">How'd it go?</h2>
    <div class="msub" id="modalSub"></div>

    <!-- Status grid -->
    <div class="status-grid">
      <button class="stat-btn voicemail" onclick="setResult('voicemail')">📱 Voicemail</button>
      <button class="stat-btn interested" onclick="setResult('interested')">🔥 Interested</button>
      <button class="stat-btn notinterested" onclick="setResult('notinterested')">🚫 Not Interested</button>
      <button class="stat-btn sold" onclick="setResult('sold')">💰 SOLD</button>
    </div>

    <!-- Notes -->
    <div class="note-section">
      <textarea id="noteInput" placeholder="Add notes... (voicemail, office closed, call back Tuesday, etc.)" oninput="saveDraftNotes()"></textarea>
    </div>

    <!-- Quick chips -->
    <div class="chip-row">
      <span class="chip" onclick="insertChip('Voicemail')">📱 Voicemail</span>
      <span class="chip" onclick="insertChip('No answer')">📵 No answer</span>
      <span class="chip" onclick="insertChip('Wrong number')">❌ Wrong #</span>
      <span class="chip" onclick="insertChip('Sent site')">🔗 Sent site</span>
      <span class="chip" onclick="insertChip('Think about it')">🤔 Think about it</span>
      <span class="chip" onclick="insertChip('Not interested')">🚫 Not interested</span>
      <span class="chip" onclick="insertChip('Has website already')">🌐 Has website</span>
      <span class="chip" onclick="insertChip('Office closed')">🏢 Office closed</span>
    </div>

    <!-- Callback scheduling -->
    <div class="cb-section">
      <div class="label">Schedule callback</div>
      <div class="cb-row">
        <span class="cb-btn" onclick="setCallback('tomorrow')">📅 Tomorrow</span>
        <span class="cb-btn" onclick="setCallback('monday')">📅 Monday</span>
        <span class="cb-btn" onclick="setCallback('2days')">📅 In 2 days</span>
        <span class="cb-btn" onclick="setCallback('3days')">📅 In 3 days</span>
        <span class="cb-btn" onclick="setCallback('1week')">📅 1 week</span>
        <span class="cb-btn cb-clear" onclick="setCallback('clear')">✕ Clear</span>
      </div>
      <div id="cbPreview" style="font-size:11px;color:var(--accent);margin-top:4px;display:none"></div>
    </div>

    <!-- Save / Dismiss -->
    <div class="action-row">
      <button class="btn-dismiss" onclick="dismissModal()">Skip</button>
      <button class="btn-save" onclick="saveAndNext()">💾 Save & Next →</button>
    </div>
  </div>
</div>

<!-- ── DELIVERY CHECKLIST ── -->
<div class="modal-back" id="checklistModal">
  <div class="modal">
    <h2>🎉 Sold! Delivery Checklist</h2>
    <div class="msub" id="checklistSub"></div>
    <label class="check-item"><input type="checkbox">💰 Collect $500 payment</label>
    <label class="check-item"><input type="checkbox">🌐 Buy domain (Cloudflare $12/yr)</label>
    <label class="check-item"><input type="checkbox">🔗 Point DNS to GitHub Pages</label>
    <label class="check-item"><input type="checkbox">📧 Set up email forwarding</label>
    <label class="check-item"><input type="checkbox">📍 Update Google Business Profile</label>
    <label class="check-item"><input type="checkbox">📱 Text client: "Live at yourdomain.com!"</label>
    <label class="check-item"><input type="checkbox">📅 Schedule 2-week check-in</label>
    <button class="btn-save" style="width:100%;margin-top:10px" onclick="document.getElementById('checklistModal').classList.remove('on');renderAll()">✓ Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let leads=[], filter='all', activeLead=null;
// Storage keys: ls=statuses, ln=notes, lc=callbacks (ISO date strings)

function loadState(){
  return {
    status: JSON.parse(localStorage.getItem('ls')||'{}'),
    notes: JSON.parse(localStorage.getItem('ln')||'{}'),
    callbacks: JSON.parse(localStorage.getItem('lc')||'{}')
  };
}

function saveStatus(name,st){let d=loadState();d.status[name]=st;localStorage.setItem('ls',JSON.stringify(d.status))}
function saveNotes(name,txt){let d=loadState();d.notes[name]=txt;localStorage.setItem('ln',JSON.stringify(d.notes))}
function saveCallback(name,iso){let d=loadState();if(iso)d.callbacks[name]=iso;else delete d.callbacks[name];localStorage.setItem('lc',JSON.stringify(d.callbacks))}

function getStatus(name){return loadState().status[name]||'new'}
function getNotes(name){return loadState().notes[name]||''}
function getCallback(name){return loadState().callbacks[name]||null}

// ── INIT ──
async function init(){
  // Load leads
  try{leads=await(await fetch('leads.json')).json()}catch(e){try{leads=await(await fetch('../leads.json')).json()}catch(e2){}}
  leads=leads.map(l=>({
    ...l,
    name:(l.name||'').trim(),
    phone:(l.phone||'').replace(/\D/g,''),
    category:l.category||l.cat||'Unknown',
    type:l.no_site?'NO_SITE':'FAKE',
    website:l.website||'',
    opener:l.opener||'',
    zip:l.zip||'',
    slug:(l.slug||(l.name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')).substring(0,50)
  }));

  // Import pre-populated status/notes from leads.json
  let imported=false;
  const d=loadState();
  leads.forEach(l=>{
    if(l.status&&!d.status[l.name]){d.status[l.name]=l.status;d.notes[l.name]=l.notes||'';imported=true}
  });
  if(imported){localStorage.setItem('ls',JSON.stringify(d.status));localStorage.setItem('ln',JSON.stringify(d.notes))}

  setupVis(); renderAll();
}

// ── RENDER ──
function renderAll(){renderLeads();updateSummary()}

function updateSummary(){
  const d=loadState();
  let c={all:leads.length,hot:0,sold:0,cb:0};
  leads.forEach(l=>{
    const s=d.status[l.name]||'new';
    if(s==='hot')c.hot++;
    if(s==='sold')c.sold++;
    if(d.callbacks[l.name])c.cb++;
  });
  document.getElementById('summary').textContent=`${leads.length} leads · ${c.sold} sold · ${c.hot} hot · ${c.cb} cb`;
}

function siteUrl(l){
  return 'https://cryptorich.github.io/applybot/sites/'+(l.slug||l.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''))+'/';
}

function renderLeads(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const d=loadState();
  let f=[...leads];

  // Search
  if(q)f=f.filter(l=>l.name.toLowerCase().includes(q)||l.phone.includes(q));

  // Filter
  if(filter==='no-site')f=f.filter(l=>l.type==='NO_SITE');
  else if(filter==='callback')f=f.filter(l=>!!d.callbacks[l.name]);
  else if(['HVAC','Electrician','Plumber','Roofer'].includes(filter))f=f.filter(l=>l.category===filter);

  // Sort: new first, then callbacks by date, then called, then rest
  f.sort((a,b)=>{
    const sa=getStatus(a.name),sb=getStatus(b.name);
    const ca=getCallback(a.name),cb=getCallback(b.name);
    // Callbacks first (soonest first)
    if(ca&&cb)return new Date(ca)-new Date(cb);
    if(ca)return -1;
    if(cb)return 1;
    // New leads first
    if(sa==='new'&&sb!=='new')return -1;
    if(sb==='new'&&sa!=='new')return 1;
    return 0;
  });

  const lst=document.getElementById('leadList');
  if(!f.length){lst.innerHTML='<div class="empty"><strong>No leads</strong><br>Try a different filter or add more leads</div>';return}

  lst.innerHTML=f.map(l=>{
    const st=getStatus(l.name);
    const nt=getNotes(l.name);
    const cb=getCallback(l.name);
    const pf=l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3');

    let badges='';
    if(l.type==='NO_SITE')badges+='<span class="badge badge-nosite">NO SITE</span> ';
    else badges+='<span class="badge badge-fake">FAKE</span> ';
    if(st==='hot')badges+='<span class="badge badge-hot">HOT</span> ';
    if(st==='sold')badges+='<span class="badge badge-sold">SOLD</span> ';
    if(st==='dead')badges+='<span class="badge badge-dead">DEAD</span> ';

    let noteLine='';
    if(nt)noteLine=`<div class="lead-note">💬 ${nt.substring(0,60)}${nt.length>60?'…':''}</div>`;

    let cbLine='';
    if(cb){
      const d=new Date(cb);
      const now=new Date();
      const diffDays=Math.ceil((d-now)/(1000*60*60*24));
      const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const label=diffDays<=0?'Today':diffDays===1?'Tomorrow':diffDays<=7?dayNames[d.getDay()]:`${d.getMonth()+1}/${d.getDate()}`;
      cbLine=`<span class="lead-cb">📅 Call ${label}</span> `;
    }

    return `<div class="lead-row status-${st}" onclick="tapLead('${l.name.replace(/'/g,"\\'")}')">
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-meta">${cbLine}${l.category} · ${pf} ${badges}</div>
        ${noteLine}
      </div>
      <div class="call-icon">📞</div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function tapLead(name){
  const l=leads.find(x=>x.name===name);
  if(!l)return;
  activeLead=l;
  // Go straight to call
  window.location.href='tel:+1'+l.phone;
}

function nextCall(){
  const d=loadState();
  // Priority: callback due today → new → called
  const today=new Date().toDateString();
  let list=leads.filter(l=>{
    const s=d.status[l.name]||'new';
    if(s==='sold'||s==='dead')return false;
    return true;
  });
  // Sort: callbacks first
  list.sort((a,b)=>{
    const ca=d.callbacks[a.name],cb=d.callbacks[b.name];
    if(ca&&cb)return new Date(ca)-new Date(cb);
    if(ca)return -1;
    if(cb)return 1;
    const sa=d.status[a.name]||'new',sb=d.status[b.name]||'new';
    if(sa==='new'&&sb!=='new')return -1;
    if(sb==='new'&&sa!=='new')return 1;
    return 0;
  });
  if(!list.length){showToast('All leads contacted! 🎉');return}
  tapLead(list[0].name);
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.cat-row button').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderLeads();
}

// ── RESULT MODAL ──
let selectedResult=null, selectedCallback=null;

function showResultModal(){
  if(!activeLead)return;
  const l=activeLead;
  document.getElementById('modalTitle').textContent=`How'd it go with ${l.name.split(' ')[0]}?`;
  document.getElementById('modalSub').textContent=`${l.category} · ${l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3')}`;

  // Pre-fill note from localStorage
  document.getElementById('noteInput').value=getNotes(l.name)||'';

  // Reset selections
  selectedResult=null;
  selectedCallback=null;
  document.querySelectorAll('.stat-btn').forEach(b=>b.style.outline='none');
  document.getElementById('cbPreview').style.display='none';

  // Show existing callback if any
  const cb=getCallback(l.name);
  if(cb){
    selectedCallback=cb;
    const d=new Date(cb);
    document.getElementById('cbPreview').textContent=`Callback set: ${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
    document.getElementById('cbPreview').style.display='block';
  }

  document.getElementById('resultModal').classList.add('on');
  document.getElementById('noteInput').focus();
}

function setResult(st){
  selectedResult=st;
  document.querySelectorAll('.stat-btn').forEach(b=>b.style.outline='none');
  // Highlight selected
  const map={voicemail:0,interested:1,notinterested:2,sold:3};
  if(map[st]!==undefined){
    document.querySelectorAll('.stat-btn')[map[st]].style.outline='2px solid white';
  }
}

function insertChip(text){
  const ta=document.getElementById('noteInput');
  const current=ta.value;
  // Add comma if needed
  const sep=current&&!current.endsWith(',')&&!current.endsWith(' ')&&current.length>0?', ':'';
  ta.value=current+sep+text;
  ta.focus();
  saveDraftNotes();
}

function setCallback(when){
  const now=new Date();
  let target=new Date(now);

  if(when==='clear'){
    selectedCallback=null;
    document.getElementById('cbPreview').style.display='none';
    return;
  }

  switch(when){
    case 'tomorrow': target.setDate(target.getDate()+1); target.setHours(9,0,0,0); break;
    case 'monday':
      const daysUntilMonday=(8-now.getDay())%7||7;
      target.setDate(target.getDate()+daysUntilMonday);
      target.setHours(9,0,0,0);
      break;
    case '2days': target.setDate(target.getDate()+2); target.setHours(9,0,0,0); break;
    case '3days': target.setDate(target.getDate()+3); target.setHours(9,0,0,0); break;
    case '1week': target.setDate(target.getDate()+7); target.setHours(9,0,0,0); break;
  }

  selectedCallback=target.toISOString();
  document.getElementById('cbPreview').textContent=`Callback set: ${target.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
  document.getElementById('cbPreview').style.display='block';
}

function saveDraftNotes(){
  if(!activeLead)return;
  saveNotes(activeLead.name, document.getElementById('noteInput').value);
}

function saveAndNext(){
  if(!activeLead)return;

  const notes=document.getElementById('noteInput').value.trim();

  // If no result selected, default to 'called' (they called, that's something)
  const result=selectedResult||'called';

  // Map to our statuses
  const statusMap={voicemail:'called',interested:'hot',notinterested:'dead',sold:'sold',called:'called'};
  const status=statusMap[result]||'called';

  saveStatus(activeLead.name, status);
  saveNotes(activeLead.name, notes);

  if(selectedCallback){
    saveCallback(activeLead.name, selectedCallback);
  } else {
    saveCallback(activeLead.name, null);
  }

  // If sold, show checklist
  if(status==='sold'){
    document.getElementById('resultModal').classList.remove('on');
    const l=activeLead;
    document.getElementById('checklistSub').textContent=`${l.name} · ${l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3')}`;
    document.getElementById('checklistModal').classList.add('on');
  } else {
    document.getElementById('resultModal').classList.remove('on');
  }

  const labels={hot:'🔥 Hot!',sold:'💰 Sold!',called:'📱 Called',dead:'☠️ Dead'};
  showToast(labels[status]||'✓ Saved');

  activeLead=null;
  renderAll();

  // Auto-advance after 1s
  if(status==='dead'||status==='called'){
    setTimeout(()=>{if(!activeLead)nextCall()},1000);
  }
}

function dismissModal(){
  // Save notes even on dismiss
  if(activeLead){
    saveNotes(activeLead.name, document.getElementById('noteInput').value);
    if(selectedCallback)saveCallback(activeLead.name,selectedCallback);
    // Mark as called if never called
    if(getStatus(activeLead.name)==='new')saveStatus(activeLead.name,'called');
  }
  document.getElementById('resultModal').classList.remove('on');
  activeLead=null;
  renderAll();
}

// ── VISIBILITY (auto-detect return from phone call) ──
function setupVis(){
  // When user returns from phone app, show result modal
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden && activeLead){
      setTimeout(()=>{
        if(activeLead)showResultModal();
      },400);
    }
  });

  // Also handle pageshow (iOS Safari)
  window.addEventListener('pageshow',(e)=>{
    if(e.persisted && activeLead){
      setTimeout(()=>{
        if(activeLead)showResultModal();
      },400);
    }
  });

  // Close modals on backdrop tap
  document.getElementById('resultModal').addEventListener('click',function(e){
    if(e.target===this)dismissModal();
  });
  document.getElementById('checklistModal').addEventListener('click',function(e){
    if(e.target===this){this.classList.remove('on');renderAll()}
  });

  // Save notes on any input change
  document.getElementById('noteInput').addEventListener('input',saveDraftNotes);
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

// ── BOOT ──
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
