<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lead CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#e0e0e0;padding-bottom:80px}
header{background:#1a1a2e;padding:1rem;position:sticky;top:0;z-index:10}
header h1{font-size:1.1rem;color:#e63946}
.stats{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
.stat{background:#16213e;padding:.3rem .7rem;border-radius:12px;font-size:.75rem}
.stat span{color:#e63946;font-weight:700}
.filters{display:flex;gap:.5rem;padding:.7rem 1rem;background:#141428;position:sticky;top:60px;z-index:9;overflow-x:auto}
.filters select,.filters button{background:#1a1a2e;color:#ccc;border:1px solid #2a2a4e;padding:.4rem .7rem;border-radius:6px;font-size:.8rem}
.filters button.active{background:#e63946;color:white;border-color:#e63946}
.lead-list{list-style:none;padding:.5rem}
.lead{background:#1a1a2e;border-radius:10px;margin-bottom:.5rem;overflow:hidden}
.lead-main{display:flex;align-items:center;padding:.8rem;gap:.5rem;cursor:pointer}
.lead-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-new{background:#444}
.status-called{background:#f4a261}
.status-interested{background:#2ec4b6}
.status-sold{background:#06d6a0}
.status-dead{background:#e63946}
.lead-info{flex:1;min-width:0}
.lead-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-meta{font-size:.7rem;color:#888;margin-top:2px}
.lead-phone{flex-shrink:0}
.lead-phone a{display:block;background:#e63946;color:white;text-decoration:none;padding:.5rem .8rem;border-radius:20px;font-size:.8rem;font-weight:700}
.lead-phone a:active{background:#c1121f}
.lead-detail{display:none;padding:0 .8rem .8rem;font-size:.75rem;border-top:1px solid #2a2a4e;padding-top:.5rem}
.lead-detail.open{display:block}
.lead-detail a{color:#e63946;word-break:break-all}
.actions{display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap}
.actions button{background:#16213e;color:#ccc;border:none;padding:.3rem .7rem;border-radius:5px;font-size:.7rem;cursor:pointer}
.actions button:active{opacity:.7}
.actions .btn-interested{background:#2ec4b6;color:#000}
.actions .btn-sold{background:#06d6a0;color:#000}
.actions .btn-dead{background:#e63946;color:white}
.actions .btn-called{background:#f4a261;color:#000}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:700;margin-left:4px}
.badge-no{background:#e63946;color:white}
.badge-fake{background:#f4a261;color:#000}
.empty-state{text-align:center;padding:3rem;color:#555}
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;padding:.8rem;display:flex;justify-content:space-around;font-size:.75rem;border-top:1px solid #2a2a4e}
.summary-bar span{color:#e63946;font-weight:700}
</style>
</head>

<header>
<h1>🔨 Lead CRM</h1>

<div class="stat">Sold <span id="sold">0</span></div>
</div>
</header>

<select id="filter-cat" onchange="render()">

<option value="Plumber">Plumber</option>

<button id="filter-no-site" onclick="toggleFilter('no-site', this)">NO SITE</button>

<button onclick="toggleFilter('new', this)" class="active">New</button>
<button onclick="toggleFilter('called', this)">Called</button>
<button onclick="toggleFilter('interested', this)">Hot</button>

<ul class="lead-list" id="lead-list"></ul>

}

function setStatus(phone, status) {
  localStorage.setItem('lead_' + phone.replace(/\D/g,''), JSON.stringify(status));
  render();
}

let activeFilters = new Set(['new']);

function toggleFilter(name, btn) {
  if (name === 'no-site' || name === 'fake-site') {
    if (activeFilters.has(name)) {
      activeFilters.delete(name);
      btn.classList.remove('active');
    } else {
      activeFilters.add(name);
      btn.classList.add('active');
    }
  } else {
    activeFilters = new Set([name]);
    document.querySelectorAll('.filters button').forEach(b => {
      if (!['no-site','fake-site'].includes(b.id.replace('filter-',''))) b.classList.remove('active');
    });
    btn.classList.add('active');
  }
  render();
}

function render() {
  const zip = document.getElementById('filter-zip').value;
  const cat = document.getElementById('filter-cat').value;
  
  let filtered = LEADS.filter(l => {
    if (zip && l.zip !== zip) return false;
    if (cat && l.cat !== cat) return false;
    
    let statusMatch = false;
    if (activeFilters.has('new') && getStatus(l.phone) === 'new') statusMatch = true;
    if (activeFilters.has('called') && getStatus(l.phone) === 'called') statusMatch = true;
    if (activeFilters.has('interested') && getStatus(l.phone) === 'interested') statusMatch = true;
    if (activeFilters.has('dead') && getStatus(l.phone) === 'dead') statusMatch = true;
    if (activeFilters.has('sold') && getStatus(l.phone) === 'sold') statusMatch = true;
    
    if (activeFilters.has('no-site') && !l.no_site) return false;
    if (activeFilters.has('fake-site') && l.no_site) return false;
    
    return statusMatch;
  });
  
  // Count stats
  let total = LEADS.length;
  let called = 0, interested = 0, sold = 0, dead = 0, noSite = 0, fakeSite = 0;
  LEADS.forEach(l => {
    let s = getStatus(l.phone);
    if (s === 'called') called++;
    if (s === 'interested') interested++;
    if (s === 'sold') sold++;
    if (s === 'dead') dead++;
    if (l.no_site) noSite++;
    else fakeSite++;
  });
  
  document.getElementById('total').textContent = total;
  document.getElementById('called').textContent = called;
  document.getElementById('interested').textContent = interested;
  document.getElementById('sold').textContent = sold;
  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('no-site-count').textContent = noSite;
  document.getElementById('fake-site-count').textContent = fakeSite;
  
  let html = '';
  if (filtered.length === 0) {
    html = '<div class="empty-state">No leads match filters</div>';
  }
  
  filtered.forEach((l, i) => {
    let status = getStatus(l.phone);
    let badge = l.no_site ? '<span class="badge badge-no">NO SITE</span>' : '<span class="badge badge-fake">FAKE</span>';
    let zipLabel = l.zip === '19720' ? 'New Castle' : l.zip === '19805' ? 'Wilmington' : 'Elkton';
    
    html += '<li class="lead">';
    html += '<div class="lead-main" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
    html += '<div class="lead-status ' + STATUS_COLORS[status] + '"></div>';
    html += '<div class="lead-info">';
    html += '<div class="lead-name">' + l.name + badge + '</div>';
    html += '<div class="lead-meta">' + l.cat + ' · ' + zipLabel + '</div>';
    html += '</div>';
    html += '<div class="lead-phone"><a href="tel:' + l.phone.replace(/[^\d]/g,'') + '">📞 Call</a></div>';
    html += '</div>';
    html += '<div class="lead-detail">';
    if (l.website) {
      html += '<div style="margin-bottom:5px">🔗 <a href="' + l.website + '" target="_blank">' + l.website.substring(0,50) + '...</a></div>';
    } else {
      html += '<div style="margin-bottom:5px">❌ No website</div>';
    }
    html += '<div style="color:#888;margin-bottom:5px">💬 ' + l.opener + '</div>';
    html += '<div class="actions">';
    html += '<button onclick="event.stopPropagation();setStatus(\'' + l.phone + '\',\'called\')" class="btn-called">📱 Called</button>';
    html += '<button onclick="event.stopPropagation();setStatus(\'' + l.phone + '\',\'interested\')" class="btn-interested">🔥 Hot</button>';
    html += '<button onclick="event.stopPropagation();setStatus(\'' + l.phone + '\',\'sold\')" class="btn-sold">💰 Sold</button>';
    html += '<button onclick="event.stopPropagation();setStatus(\'' + l.phone + '\',\'dead\')" class="btn-dead">☠️ Dead</button>';
    html += '</div></div>';
    html += '</li>';
  });
  
  document.getElementById('lead-list').innerHTML = html;
}

render();
</script>
</body>
</html>
