<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lead CRM</title>
<style>
:root{--bg:#0f0f0f;--card:#1a1a1a;--accent:#00e676;--hot:#ffab00;--dead:#ff1744;--text:#eee;--sub:#999;--border:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:20px;margin-bottom:8px}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{background:var(--card);color:var(--sub);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap}
.filters button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.lead-list{padding:8px 12px 100px}
.lead-card{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:all .15s}
.lead-card:active{transform:scale(.98)}
.lead-head{display:flex;align-items:center;padding:14px 16px;gap:12px}
.lead-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-new{background:#444}
.status-called{background:var(--hot)}
.status-hot{background:var(--accent)}
.status-sold{background:#2979ff}
.status-dead{background:var(--dead)}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-meta{font-size:12px;color:var(--sub);display:flex;gap:8px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-no-site{background:rgba(255,23,68,.2);color:var(--dead)}
.badge-fake{background:rgba(255,171,0,.2);color:var(--hot)}
.call-btn{background:var(--accent);color:#000;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;text-decoration:none}
.lead-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.lead-card.open .lead-detail{display:block}
.detail-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.detail-row:last-child{border:none}
.detail-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:55px}
.detail-value{font-size:14px;flex:1;word-break:break-all}
.copy-link{background:var(--border);color:var(--text);border:none;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between}
.copy-link:active{background:var(--accent);color:#000}
.copy-link .icon{font-size:16px}
.script-box{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:8px;padding:12px;font-size:13px;line-height:1.5;color:#ccc;margin:4px 0}
.script-box strong{color:var(--accent)}
.actions{display:flex;gap:6px;padding-top:8px;flex-wrap:wrap}
.actions button{flex:1;min-width:60px;padding:10px 8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .1s}
.btn-called{background:#3a3000;color:var(--hot)}
.btn-hot{background:#003a1a;color:var(--accent)}
.btn-sold{background:#001a3a;color:#2979ff}
.btn-dead{background:#3a0010;color:var(--dead)}
.btn-called:active,.btn-hot:active,.btn-sold:active,.btn-dead:active{filter:brightness(1.5)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-weight:600;font-size:14px;z-index:100;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:10}
.nav-item{flex:1;text-align:center;padding:8px 4px;border:none;background:none;color:var(--sub);font-size:11px;cursor:pointer;border-radius:8px}
.nav-item.active{color:var(--accent);font-weight:600}
.nav-count{display:block;font-size:18px;font-weight:700}
.empty{text-align:center;padding:60px 20px;color:var(--sub);font-size:15px}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;width:100%;margin-bottom:8px;outline:none}
.search-box:focus{border-color:var(--accent)}
.summary{display:flex;gap:16px;font-size:12px;color:var(--sub);margin-bottom:8px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 Leads</h1>
  <input class="search-box" placeholder="Search name or phone..." oninput="renderLeads()" id="search">
  <div class="summary" id="summary"></div>
  <div class="filters">
    <button class="active" onclick="setFilter('all',this)">All</button>
    <button onclick="setFilter('no-site',this)">🔴 No Site</button>
    <button onclick="setFilter('fake',this)">🟡 Fake Site</button>
    <button onclick="setFilter('HVAC',this)">HVAC</button>
    <button onclick="setFilter('Electrician',this)">Electrician</button>
    <button onclick="setFilter('Plumber',this)">Plumber</button>
    <button onclick="setFilter('Roofer',this)">Roofer</button>
  </div>
</div>

<div class="lead-list" id="leadList"></div>

<div class="toast" id="toast"></div>

<div class="navbar">
  <button class="nav-item active" onclick="setNav('all',this)"><span class="nav-count" id="navAll">0</span>All</button>
  <button class="nav-item" onclick="setNav('called',this)"><span class="nav-count" id="navCalled">0</span>Called</button>
  <button class="nav-item" onclick="setNav('hot',this)"><span class="nav-count" id="navHot">0</span>Hot</button>
  <button class="nav-item" onclick="setNav('sold',this)"><span class="nav-count" id="navSold">0</span>Sold</button>
  <button class="nav-item" onclick="setNav('dead',this)"><span class="nav-count" id="navDead">0</span>Dead</button>
</div>

<script>
let leads = [];
let statuses = JSON.parse(localStorage.getItem('leadStatuses')||'{}');
let sites = {}; // name -> url mapping
let currentNav = 'all';
let currentFilter = 'all';
let openCard = null;

async function init() {
  try {
    const resp = await fetch('../leads.json');
    leads = await resp.json();
  } catch(e) {
    // Fallback embedded data
    console.log('Using embedded leads');
  }
  normalizeLeads();
  renderAll();
}

function normalizeLeads() {
  leads.forEach(l => {
    l.name = (l.name||'').trim();
    l.phone = (l.phone||'').replace(/\D/g,'');
    l.category = l.category||'Unknown';
    l.zip = l.zip||'';
    l.type = l.type||'FAKE';
    l.website = l.website||'';
    l.opener = l.opener||'';
    // Generate site URL
    const slug = l.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    sites[l.name] = `cryptorich.github.io/applybot/sites/${slug}/`;
  });
}

function getStatus(name) { return statuses[name]||'new'; }
function setStatus(name, st) { statuses[name]=st; localStorage.setItem('leadStatuses',JSON.stringify(statuses)); renderAll(); }

function setNav(nav, btn) {
  currentNav = nav;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function renderAll() {
  updateCounts();
  renderLeads();
}

function updateCounts() {
  let c={all:0,called:0,hot:0,sold:0,dead:0};
  leads.forEach(l=>{
    c.all++;
    const st = getStatus(l.name);
    if(st==='called') c.called++;
    if(st==='hot') c.hot++;
    if(st==='sold') c.sold++;
    if(st==='dead') c.dead++;
  });
  document.getElementById('navAll').textContent = c.all;
  document.getElementById('navCalled').textContent = c.called;
  document.getElementById('navHot').textContent = c.hot;
  document.getElementById('navSold').textContent = c.sold;
  document.getElementById('navDead').textContent = c.dead;
  document.getElementById('summary').innerHTML = `🔴 No site: <b>${leads.filter(l=>l.type==='NO_SITE').length}</b> · 🟡 Fake: <b>${leads.filter(l=>l.type==='FAKE').length}</b> · ✅ Has site: <b>${leads.filter(l=>l.type==='HAS_SITE').length}</b>`;
}

function renderLeads() {
  const search = (document.getElementById('search').value||'').toLowerCase();
  let filtered = leads;

  // Search
  if (search) filtered = filtered.filter(l => l.name.toLowerCase().includes(search) || l.phone.includes(search));

  // Nav filter
  if (currentNav === 'called') filtered = filtered.filter(l => getStatus(l.name)==='called');
  if (currentNav === 'hot') filtered = filtered.filter(l => getStatus(l.name)==='hot');
  if (currentNav === 'sold') filtered = filtered.filter(l => getStatus(l.name)==='sold');
  if (currentNav === 'dead') filtered = filtered.filter(l => getStatus(l.name)==='dead');

  // Category/type filter
  if (currentFilter === 'no-site') filtered = filtered.filter(l => l.type==='NO_SITE');
  else if (currentFilter === 'fake') filtered = filtered.filter(l => l.type==='FAKE');
  else if (['HVAC','Electrician','Plumber','Roofer'].includes(currentFilter)) filtered = filtered.filter(l => l.category===currentFilter);

  const list = document.getElementById('leadList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No leads match</div>';
    return;
  }

  list.innerHTML = filtered.map(l => {
    const status = getStatus(l.name);
    const statusClass = `status-${status}`;
    const siteUrl = sites[l.name]||'';
    const phoneFormatted = l.phone.replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3');
    const isOpen = openCard === l.name;
    const typeBadge = l.type==='NO_SITE' ? '<span class="badge badge-no-site">NO SITE</span>' : l.type==='FAKE' ? '<span class="badge badge-fake">FAKE</span>' : '';

    return `
    <div class="lead-card${isOpen?' open':''}" id="card-${l.name.replace(/[^a-z0-9]/gi,'')}">
      <div class="lead-head" onclick="toggleCard('${l.name.replace(/'/g,"\\'")}')">
        <div class="lead-status ${statusClass}"></div>
        <div class="lead-info">
          <div class="lead-name">${l.name}</div>
          <div class="lead-meta">${l.category||'?'} · ${l.zip||'?'} ${typeBadge}</div>
        </div>
        <a href="tel:+1${l.phone}" class="call-btn" onclick="event.stopPropagation()">📞</a>
      </div>
      <div class="lead-detail">
        <div class="detail-row">
          <span class="detail-label">📞 CALL</span>
          <a href="tel:+1${l.phone}" style="color:var(--accent);font-size:18px;font-weight:700;text-decoration:none">${phoneFormatted}</a>
        </div>
        ${l.website ? `<div class="detail-row">
          <span class="detail-label">🌐 SITE</span>
          <span class="detail-value" style="font-size:12px;color:var(--sub)">${l.website}</span>
        </div>` : ''}
        <div class="detail-row">
          <span class="detail-label">🔗 LINK</span>
          <button class="copy-link" onclick="copySite('${siteUrl}')">
            <span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${siteUrl}</span>
            <span class="icon">📋</span>
          </button>
        </div>
        ${l.opener ? `<div class="script-box">${l.opener}</div>` : ''}
        <div class="actions">
          <button class="btn-called" onclick="setStatus('${l.name.replace(/'/g,"\\'")}','called');toggleCard('${l.name.replace(/'/g,"\\'")}',false)">📱 Called</button>
          <button class="btn-hot" onclick="setStatus('${l.name.replace(/'/g,"\\'")}','hot');toggleCard('${l.name.replace(/'/g,"\\'")}',false)">🔥 Hot</button>
          <button class="btn-sold" onclick="setStatus('${l.name.replace(/'/g,"\\'")}','sold');toggleCard('${l.name.replace(/'/g,"\\'")}',false)">💰 Sold</button>
          <button class="btn-dead" onclick="setStatus('${l.name.replace(/'/g,"\\'")}','dead');toggleCard('${l.name.replace(/'/g,"\\'")}',false)">☠️ Dead</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(name, scroll=true) {
  if (openCard === name) {
    openCard = null;
  } else {
    openCard = name;
    if (scroll) setTimeout(() => {
      const el = document.getElementById('card-'+name.replace(/[^a-z0-9]/gi,''));
      if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
    }, 100);
  }
  renderAll();
}

function copySite(url) {
  const fullUrl = 'https://'+url;
  navigator.clipboard.writeText(fullUrl).then(() => showToast('Link copied! 📋'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
