<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ApplyBot — Find Opportunity</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#080808;--accent:#00e676;--hot:#ffab00;--dead:#ff1744;--sold:#2979ff;--discover:#7c4dff;--text:#fff;--sub:#999;--surface:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}

#map{width:100%;height:100%;z-index:1}
.leaflet-control-zoom{display:none}

/* Top bar overlay */
.top-overlay{position:fixed;top:0;left:0;right:0;z-index:1000;padding:6px 8px;pointer-events:none}
.top-overlay>*{pointer-events:auto}
.top-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.top-row h1{font-size:14px;color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,.8);flex:1}
.top-row button{background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:20px;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.top-row button.scanning{background:var(--hot);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Stats badge */
.stats-badge{display:inline-flex;gap:6px;background:rgba(0,0,0,.85);border-radius:16px;padding:6px 10px;font-size:10px;color:var(--sub);backdrop-filter:blur(10px)}
.stats-badge span{font-weight:700}
.stats-badge .red{color:var(--dead)}
.stats-badge .yellow{color:var(--hot)}
.stats-badge .green{color:var(--accent)}
.stats-badge .blue{color:var(--discover)}

/* Category chips */
.cat-chips{display:flex;gap:4px;flex-wrap:wrap}
.cat-chips button{background:rgba(0,0,0,.8);color:var(--sub);border:1px solid rgba(255,255,255,.15);padding:4px 10px;border-radius:14px;font-size:10px;cursor:pointer;backdrop-filter:blur(10px)}
.cat-chips button.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:1000;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:8px}
.bottom-bar button{flex:1;padding:12px;border-radius:12px;border:none;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.btn-scan{background:var(--discover);color:#fff}
.btn-reset{background:rgba(0,0,0,.8);color:var(--text);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(10px)}
.btn-crm{background:var(--accent);color:#000}

/* Popup styles */
.leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border-radius:10px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.leaflet-popup-content{margin:10px 12px;font-size:12px;line-height:1.5}
.leaflet-popup-tip{background:var(--surface)}
.popup-name{font-size:13px;font-weight:700;margin-bottom:2px}
.popup-meta{font-size:10px;color:var(--sub);margin-bottom:4px}
.popup-actions{display:flex;gap:4px;margin-top:6px}
.popup-actions a,.popup-actions button{flex:1;text-align:center;padding:6px 8px;border-radius:8px;font-size:10px;font-weight:600;text-decoration:none;cursor:pointer;border:none}
.popup-call{background:var(--accent);color:#000}
.popup-copy{background:var(--surface);color:var(--accent);border:1px solid var(--accent)}
.popup-add{background:var(--discover);color:#fff}

/* Marker legend */
.legend{position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:1000;display:flex;flex-direction:column;gap:3px}
.legend-item{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.75);padding:4px 8px;border-radius:10px;font-size:8px;color:var(--sub);backdrop-filter:blur(10px)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:6px 16px;border-radius:16px;font-weight:700;font-size:11px;z-index:2000;opacity:0;transition:opacity .15s;pointer-events:none}
.toast.show{opacity:1}

/* Mobile zoom buttons */
.zoom-btns{position:fixed;right:8px;bottom:120px;z-index:1000;display:flex;flex-direction:column;gap:4px}
.zoom-btns button{width:36px;height:36px;border-radius:50%;border:none;background:rgba(0,0,0,.8);color:var(--text);font-size:20px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="map"></div>

<!-- Top overlay -->
<div class="top-overlay">
  <div class="top-row">
    <h1>🗺️ ApplyBot</h1>
    <button id="scanBtn" onclick="scanArea()">🔍 Scan Area</button>
  </div>
  <div class="stats-badge" id="statsBadge">
    <span class="red" id="statRed">0</span> no site
    <span class="yellow" id="statYellow">0</span> fake
    <span class="green" id="statGreen">0</span> real
    <span class="blue" id="statBlue">0</span> new
  </div>
  <div class="cat-chips" style="margin-top:4px">
    <button class="on" onclick="setCat('all',this)">All</button>
    <button onclick="setCat('HVAC',this)">HVAC</button>
    <button onclick="setCat('Electrician',this)">Elec</button>
    <button onclick="setCat('Plumber',this)">Plumb</button>
    <button onclick="setCat('Roofer',this)">Roof</button>
    <button onclick="setCat('discovered',this)">🆕 New</button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--dead)"></div>No site</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--hot)"></div>Fake site</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Real site</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--discover)"></div>Discovered</div>
</div>

<!-- Zoom buttons -->
<div class="zoom-btns">
  <button onclick="map.zoomIn()">+</button>
  <button onclick="map.zoomOut()">−</button>
  <button onclick="map.locate({setView:true,maxZoom:15})" style="font-size:12px">📍</button>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn-scan" onclick="scanArea()">🔍 Scan Area</button>
  <button class="btn-crm" onclick="window.open('https://cryptorich.github.io/CRM/','_blank')">📞 CRM</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── STATE ──
let leads=[], markers=[], discoveredMarkers=[], activeCat='all', scanning=false;

// Zip centroids with jitter ranges
const ZIP_COORDS={
  '19805':[39.745,-75.548],
  '19720':[39.675,-75.605],
  '21921':[39.610,-75.835],
  '19804':[39.718,-75.528],
  '19801':[39.737,-75.547],
  '19802':[39.752,-75.532],
  '19803':[39.776,-75.524],
  '19806':[39.762,-75.565],
  '19807':[39.772,-75.590],
  '19808':[39.738,-75.650],
  '19809':[39.766,-75.510],
  '19810':[39.820,-75.528],
  '19701':[39.664,-75.710],
  '19702':[39.653,-75.750],
  '19703':[39.712,-75.530],
  '19709':[39.488,-75.716],
  '19711':[39.702,-75.721],
  '19713':[39.675,-75.735],
  '21901':[39.583,-75.891],
  '21911':[39.704,-75.924],
  '21912':[39.533,-75.791],
  '21913':[39.525,-75.870],
  '21914':[39.556,-75.886],
  '21915':[39.546,-75.830],
  '21917':[39.658,-75.811],
  '21918':[39.634,-75.788],
  '21919':[39.427,-75.832],
  '21920':[39.593,-75.870],
  '21930':[39.462,-75.867]
};
const DEFAULT_COORDS=[39.746,-75.547]; // Wilmington

// ── MAP ──
const map=L.map('map',{zoomControl:false,attributionControl:false}).setView([39.5,-75.8],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OSM'}).addTo(map);

// ── MARKER ICONS ──
function mkIcon(color){return L.divIcon({className:'',html:'<div style="width:16px;height:16px;border-radius:50%;background:'+color+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>',iconSize:[16,16],iconAnchor:[8,8]})}

const ICONS={
  nosite:mkIcon('var(--dead)'),
  fake:mkIcon('var(--hot)'),
  real:mkIcon('var(--accent)'),
  discovered:mkIcon('var(--discover)')
};
// Fix colors for inline style
Object.keys(ICONS).forEach(k=>{
  const c={nosite:'#ff1744',fake:'#ffab00',real:'#00e676',discovered:'#7c4dff'}[k];
  ICONS[k]=L.divIcon({className:'',html:'<div style="width:16px;height:16px;border-radius:50%;background:'+c+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
});

// ── INIT ──
async function init(){
  // Load existing leads
  try{leads=await(await fetch('sites/leads.json')).json()}catch(e){try{leads=await(await fetch('../sites/leads.json')).json()}catch(e2){leads=[]}}
  plotLeads();
  updateStats();
}

function getCoords(lead){
  const zc=ZIP_COORDS[lead.zip]||DEFAULT_COORDS;
  // Add jitter so markers don't stack
  const jlat=(Math.random()-0.5)*0.02;
  const jlng=(Math.random()-0.5)*0.02;
  return [zc[0]+jlat,zc[1]+jlng];
}

function leadMarker(lead){
  const type=lead.no_site?'nosite':'fake';
  const coords=getCoords(lead);
  const cat=lead.category||lead.cat||'Unknown';
  const phone=(lead.phone||'').replace(/(\d{3})(\d{3})(\d{4})/,'($1) $2-$3');
  const slug=lead.slug||(lead.name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').substring(0,50);
  const siteUrl='https://cryptorich.github.io/applybot/sites/'+slug+'/';
  const opener=lead.opener||'Hey, I built a website for your '+cat.toLowerCase()+' business. Want me to text you the link?';

  const popup='<div class="popup-name">'+escHtml(lead.name)+'</div>'+
    '<div class="popup-meta">'+escHtml(cat)+' · '+escHtml(phone)+' · '+escHtml(lead.zip||'')+'</div>'+
    '<div class="popup-meta" style="color:'+(type==='nosite'?'var(--dead)':'var(--hot)')+'">'+(type==='nosite'?'⚠ NO WEBSITE':'⚠ FAKE SITE')+'</div>'+
    '<div class="popup-actions">'+
      '<a class="popup-call" href="tel:+1'+(lead.phone||'')+'">📞 Call</a>'+
      '<button class="popup-copy" onclick="copyText(\''+escJs(siteUrl)+'\')">📋 Copy</button>'+
    '</div>';

  const m=L.marker(coords,{icon:ICONS[type]}).bindPopup(popup,{maxWidth:260});
  m._leadData=lead;
  m._leadType=type;
  return m;
}

function plotLeads(){
  clearMarkers();
  let filtered=activeCat==='all'||activeCat==='discovered'?leads:leads.filter(l=>(l.category||l.cat||'')===activeCat);
  if(activeCat==='discovered')filtered=[];
  filtered.forEach(l=>{
    const m=leadMarker(l);
    m.addTo(map);
    markers.push(m);
  });
}

function clearMarkers(){
  markers.forEach(m=>m.remove());
  markers=[];
}

// ── SCAN AREA ──
async function scanArea(){
  if(scanning)return;
  scanning=true;
  const btn=document.getElementById('scanBtn');
  btn.textContent='⏳ Scanning...';
  btn.classList.add('scanning');
  showToast('Scanning visible area...');

  const bounds=map.getBounds();
  const south=bounds.getSouth(),west=bounds.getWest(),north=bounds.getNorth(),east=bounds.getEast();
  const bbox=[south,west,north,east].join(',');

  try{
    const query='[out:json][timeout:8];('+
      'node["craft"="plumber"]('+bbox+');'+
      'node["craft"="electrician"]('+bbox+');'+
      'node["craft"="hvac"]('+bbox+');'+
      'node["craft"="roofer"]('+bbox+');'+
      'node["office"="construction"]('+bbox+');'+
      'node["shop"="plumber"]('+bbox+');'+
      'node["office"="electrician"]('+bbox+');'+
      'way["craft"="plumber"]('+bbox+');'+
      'way["craft"="electrician"]('+bbox+');'+
      'way["craft"="hvac"]('+bbox+');'+
      'way["craft"="roofer"]('+bbox+');'+
      ');out center 50;';

    const resp=await fetch('https://overpass-api.de/api/interpreter',{
      method:'POST',body:'data='+encodeURIComponent(query),
      headers:{'Content-Type':'application/x-www-form-urlencoded'}
    });
    const data=await resp.json();

    // Clear old discovered markers
    discoveredMarkers.forEach(m=>m.remove());
    discoveredMarkers=[];

    let count=0;
    (data.elements||[]).forEach(el=>{
      if(!el.tags||!el.tags.name)return;
      const name=el.tags.name;
      const lat=el.lat||el.center?.lat;
      const lon=el.lon||el.center?.lon;
      if(!lat||!lon)return;

      const phone=el.tags.phone||el.tags['contact:phone']||'';
      const website=el.tags.website||el.tags['contact:website']||'';
      const cat=el.tags.craft||el.tags.shop||el.tags.office||'Business';
      const addr=[el.tags['addr:street'],el.tags['addr:city'],el.tags['addr:state']].filter(Boolean).join(', ');

      // Skip if already in leads
      const exists=leads.some(l=>l.name.toLowerCase()===name.toLowerCase());
      if(exists)return;

      const popup='<div class="popup-name">'+escHtml(name)+' 🆕</div>'+
        '<div class="popup-meta">'+escHtml(cat)+(addr?' · '+escHtml(addr):'')+'</div>'+
        (phone?'<div class="popup-meta">📞 '+escHtml(phone)+'</div>':'')+
        (website?'<div class="popup-meta">🌐 <a href="'+escHtml(website)+'" target="_blank">'+escHtml(website.substring(0,40))+'</a></div>':'<div class="popup-meta" style="color:var(--dead)">⚠ No website found</div>')+
        '<div class="popup-actions">'+
          (phone?'<a class="popup-call" href="tel:'+escHtml(phone)+'">📞 Call</a>':'')+
          '<button class="popup-add" onclick="addDiscovered(\''+escJs(name)+'\',\''+escJs(cat)+'\',\''+escJs(phone)+'\',\''+escJs(website)+'\')">+ Add</button>'+
        '</div>';

      const m=L.marker([lat,lon],{icon:ICONS.discovered}).bindPopup(popup,{maxWidth:260});
      m.addTo(map);
      discoveredMarkers.push(m);
      count++;
    });

    showToast('Found '+count+' businesses 📍');
  }catch(e){
    showToast('Scan failed — try zooming in more');
    console.error(e);
  }

  btn.textContent='🔍 Scan Area';
  btn.classList.remove('scanning');
  scanning=false;
  updateStats();
}

// ── ADD DISCOVERED LEAD ──
function addDiscovered(name,cat,phone,website){
  const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  const noSite=!website;
  const newLead={
    name,phone:phone.replace(/\D/g,''),
    category:cat,cat,
    zip:'',
    no_site:noSite,
    website:website||'',
    opener:'Hey, is this '+name.split(' ')[0]+'? I noticed your '+cat.toLowerCase()+' business online'+(noSite?' doesn\'t have a real website.':' has a website that could be better.')+' I built one. Want me to text you the link?',
    slug,
    type:noSite?'NO_SITE':'FAKE',
    discovered:true
  };
  leads.push(newLead);
  // Re-plot
  const m=leadMarker(newLead);
  m.addTo(map);
  markers.push(m);
  // Remove from discovered
  const idx=discoveredMarkers.findIndex(dm=>dm._popup&&dm.getPopup().getContent().includes(name));
  if(idx>=0){discoveredMarkers[idx].remove();discoveredMarkers.splice(idx,1)}
  showToast('Added: '+name+' ✅');
  saveLeads();
  updateStats();
}

function saveLeads(){
  // Save to localStorage as backup (can't write to leads.json from browser)
  try{localStorage.setItem('discovered_leads',JSON.stringify(leads.filter(l=>l.discovered)))}catch(e){}
}

// ── FILTERS ──
function setCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-chips button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  plotLeads();
  if(cat==='discovered'){
    // Show only discovered
    clearMarkers();
    discoveredMarkers.forEach(m=>m.addTo(map));
  }else{
    // Show leads + discovered
    plotLeads();
    discoveredMarkers.forEach(m=>m.addTo(map));
  }
}

// ── STATS ──
function updateStats(){
  let nosite=0,fake=0,real=0,discovered=discoveredMarkers.length;
  leads.forEach(l=>{
    if(l.no_site)nosite++;else fake++;
  });
  document.getElementById('statRed').textContent=nosite;
  document.getElementById('statYellow').textContent=fake;
  document.getElementById('statGreen').textContent=real;
  document.getElementById('statBlue').textContent=discovered;
}

// ── UTILS ──
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"')}
function copyText(t){navigator.clipboard.writeText(t).then(()=>showToast('Copied! 📋')).catch(()=>showToast('Copy failed'))}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

// ── RESTORE DISCOVERED LEADS ──
function restoreDiscovered(){
  try{
    const saved=JSON.parse(localStorage.getItem('discovered_leads')||'[]');
    saved.forEach(l=>{if(!leads.find(x=>x.name===l.name))leads.push(l)});
    plotLeads();
    updateStats();
  }catch(e){}
}

document.addEventListener('DOMContentLoaded',()=>{init();restoreDiscovered()});

// Auto-refresh on pan/zoom end (for discovered markers)
map.on('moveend',()=>{updateStats()});
</script>
</body>
</html>
